<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>n+1</title>
    <style>
        body {
            background: #ffffff;
            color: #000000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            text-align: center;
            max-width: 600px;
        }
        .loader {
            font-size: 18px;
            color: #000000;
            margin-bottom: 20px;
        }
        .loader-dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            33% { content: '.'; }
            66% { content: '..'; }
            100% { content: '...'; }
        }
        .lang-list {
            margin-top: 30px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px 15px;
            font-size: 14px;
        }
        .lang-list a {
            color: #0000CC;
            text-decoration: underline;
        }
        .lang-list a:hover {
            background: #0000CC;
            color: #FFFFFF;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="loader">
        Выбор языка <span class="loader-dots"></span>
    </div>

    <div class="lang-list">
        <a href="index-ru.html">Русский</a>
        <a href="index-en.html">English</a>
        <a href="index-de.html">Deutsch</a>
        <a href="index-es.html">Español</a>
        <a href="index-fr.html">Français</a>
        <a href="index-it.html">Italiano</a>
        <a href="index-ja.html">日本語</a>
        <a href="index-ko.html">한국어</a>
        <a href="index-tr.html">Türkçe</a>
        <a href="index-zh.html">中文</a>
        <a href="index-fa.html">فارسی</a>
        <a href="index-hi.html">हिन्दी</a>
        <a href="index-ar.html">العربية</a>
    </div>

</div>

<script>
    // Определяем язык браузера
    var userLang = navigator.language || navigator.userLanguage;
    var lang = userLang.substring(0, 2).toLowerCase();

    // Карта соответствия языков
    var langMap = {
        'ru': 'index-ru.html',
        'en': 'index-en.html',
        'de': 'index-de.html',
        'es': 'index-es.html',
        'fr': 'index-fr.html',
        'it': 'index-it.html',
        'ja': 'index-ja.html',
        'ko': 'index-ko.html',
        'tr': 'index-tr.html',
        'zh': 'index-zh.html',
        'fa': 'index-fa.html',
        'hi': 'index-hi.html',
        'ar': 'index-ar.html'
    };

    // Если язык есть в карте — перенаправляем
    if (langMap[lang]) {
        window.location.href = langMap[lang];
    } else {
        // Если язык не поддерживается — перенаправляем на английский
        window.location.href = 'index-en.html';
    }
</script>

</body>
</html>
